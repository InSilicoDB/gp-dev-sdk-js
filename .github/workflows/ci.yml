name: CI

on:
  push:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run lint
        run: yarn lint

      - name: Run tests
        run: yarn test

  npm-publish:
      if: startsWith(github.ref, 'refs/tags/')
      needs: test-and-lint
      runs-on: ubuntu-latest
      environment: npm-publish
      permissions:
        id-token: write
        contents: read # Required to read the code for provenance

      steps:
        - name: Checkout code
          uses: actions/checkout@v4 # v4 is standard; v5 is fine if available

        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 22
            # Note: Do NOT set registry-url here for Trusted Publishing
            # Setting registry-url tells npm to look for a NODE_AUTH_TOKEN
            # which overrides the automatic OIDC login.

        - name: Ensure clean OIDC environment
          run: |
            rm -f .npmrc
            npm install -g npm@latest

        - name: Install dependencies
          run: yarn install --frozen-lockfile

        - name: Set version from tag
          run: npm version ${GITHUB_REF_NAME} --no-git-tag-version

        - name: Publish to npm
          run: npm publish --access public --provenance
          # No 'env: NODE_AUTH_TOKEN' needed here!
